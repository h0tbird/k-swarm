apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: k-swarm
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: k-swarm
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: k-swarm
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: k-swarm
        k-swarm/peer: enabled
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
        - --leader-elect=false
        - --enable-worker=true
        - --worker-bind-address=:8082
        - --service-name=$(SERVICE_NAME)
        - --memberlist-bind-address=:7946
        - --memberlist-join-dns=peers.k-swarm-system.svc.cluster.local
        - --worker-request-interval=2s
        image: controller:latest
        name: manager
        env:
        - name: CLUSTER_NAME
          value: "kind-dev"
        - name: SERVICE_NAME
          value: "peer"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - containerPort: 8082
          name: peer
          protocol: TCP
        - containerPort: 7946
          name: gossip-tcp
          protocol: TCP
        - containerPort: 7946
          name: gossip-udp
          protocol: UDP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: peer
  labels:
    app: k-swarm
spec:
  selector:
    k-swarm/peer: enabled
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: peer
---
# Headless Service whose A records list every peer pod IP. Used by
# memberlist as the bootstrap DNS for joining the gossip ring.
apiVersion: v1
kind: Service
metadata:
  name: peers
  labels:
    app: k-swarm
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    k-swarm/peer: enabled
  ports:
    - name: gossip-tcp
      protocol: TCP
      port: 7946
      targetPort: gossip-tcp
    - name: gossip-udp
      protocol: UDP
      port: 7946
      targetPort: gossip-udp
